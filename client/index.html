<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-time Chat</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <div class="login-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h1>Real-time Chat</h1>
      <p class="login-subtitle">Enter a username to get started</p>
      <form id="login-form">
        <input type="text" id="username-input" placeholder="Your username..." maxlength="20" autocomplete="off" required>
        <button type="submit" class="btn btn-primary">Join Chat</button>
      </form>
      <div id="login-error" class="error-msg hidden"></div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="screen hidden">
    <div class="chat-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Rooms</h2>
          <button id="create-room-btn" class="btn btn-icon" title="Create room">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div id="room-list" class="room-list">
          <div class="loading-spinner">Loading rooms...</div>
        </div>
        <div class="sidebar-footer">
          <div class="user-info">
            <div class="user-avatar" id="user-avatar"></div>
            <span id="current-username"></span>
          </div>
          <button id="logout-btn" class="btn btn-icon btn-danger-icon" title="Log out">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main class="chat-main">
        <!-- No room selected state -->
        <div id="no-room" class="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <h3>Select a room to start chatting</h3>
          <p>Choose a room from the sidebar or create a new one</p>
        </div>

        <!-- Active chat -->
        <div id="active-chat" class="active-chat hidden">
          <div class="chat-header">
            <div class="chat-header-info">
              <h3 id="room-name"></h3>
              <span id="room-description" class="room-desc"></span>
            </div>
            <div class="chat-header-actions">
              <button id="toggle-users-btn" class="btn btn-icon" title="Toggle users panel">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span id="online-count" class="badge">0</span>
              </button>
              <button id="delete-room-btn" class="btn btn-icon btn-danger-icon" title="Delete room">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="chat-body-wrapper">
            <div id="messages" class="messages">
              <div class="loading-spinner">Loading messages...</div>
            </div>

            <!-- Users panel -->
            <div id="users-panel" class="users-panel hidden">
              <div class="users-panel-header">
                <h4>Online Users</h4>
              </div>
              <div id="users-list" class="users-list"></div>
            </div>
          </div>

          <div id="typing-indicator" class="typing-indicator hidden">
            <div class="typing-dots">
              <span></span><span></span><span></span>
            </div>
            <span id="typing-text"></span>
          </div>

          <form id="message-form" class="message-form">
            <input type="text" id="message-input" placeholder="Type a message..." maxlength="2000" autocomplete="off">
            <button type="submit" class="btn btn-primary btn-send" id="send-btn" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </form>
        </div>
      </main>
    </div>
  </div>

  <!-- Create Room Modal -->
  <div id="create-room-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Create New Room</h3>
        <button class="btn btn-icon modal-close" id="close-modal-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form id="create-room-form">
        <div class="form-group">
          <label for="room-name-input">Room Name</label>
          <input type="text" id="room-name-input" placeholder="e.g. Design Team" maxlength="50" required>
        </div>
        <div class="form-group">
          <label for="room-desc-input">Description (optional)</label>
          <input type="text" id="room-desc-input" placeholder="What's this room about?" maxlength="100">
        </div>
        <div id="create-room-error" class="error-msg hidden"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancel-modal-btn">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Room</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="src/app.js"></script>
</body>
</html>
